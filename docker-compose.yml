services:
  node-0:
    build: .
    hostname: node-0
    environment:
      NODE_ID: "0"
      CLUSTER_SIZE: "3"
    volumes:
      - raft-data:/data

  node-1:
    build: .
    hostname: node-1
    environment:
      NODE_ID: "1"
      CLUSTER_SIZE: "3"
    volumes:
      - raft-data:/data
    depends_on:
      - node-0

  node-2:
    build: .
    hostname: node-2
    environment:
      NODE_ID: "2"
      CLUSTER_SIZE: "3"
    volumes:
      - raft-data:/data
    depends_on:
      - node-1

volumes:
  raft-data:
